<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>族群數量統計互動系統</title>
  <style>
    :root {
      --canvas-bg: #111827;
      --net-size: 82px;
      --paper: #f6fbfb;
      --paper-warm: #fbfaf5;
      --card: rgba(255, 255, 255, 0.96);
      --text: #23323a;
      --soft: #607179;
      --line: rgba(66, 90, 102, 0.14);
      --line-strong: rgba(66, 90, 102, 0.22);
      --shadow: 0 1px 2px rgba(33, 43, 54, 0.05), 0 8px 24px rgba(33, 43, 54, 0.035);
      --blue: #e6f2f8;
      --blue-active: #d9eaf3;
      --green: #e9f3e6;
      --green-active: #dbeed6;
      --lilac: #f0ebf8;
      --lilac-active: #e5def3;
      --sage: #5f7a6f;
      --sage-dark: #4d675d;
      --sky: #6d8798;
      --charcoal: #2f3b42;
      --rose-bg: #f7efef;
      --rose-text: #725757;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background: linear-gradient(180deg, var(--paper) 0%, #f8f7f1 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing: 0.01em;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    #app {
      width: 100vw;
      height: 100dvh;
      padding: 10px 12px;
      overflow: hidden;
    }

    .layout-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
      gap: 12px;
      height: calc(100dvh - 20px);
      max-width: 1520px;
      margin: 0 auto;
      align-items: start;
      overflow: hidden;
    }

    .left-column,
    .right-column {
      min-width: 0;
      display: grid;
      gap: 10px;
    }

    .left-column {
      grid-template-rows: auto auto auto;
      overflow: hidden;
    }

    .right-column {
      grid-template-rows: auto auto minmax(0, auto);
      align-content: start;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 100%;
      padding: 12px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .language-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(10px);
    }

    .language-switcher span {
      padding: 0 6px;
      color: var(--soft);
      font-size: 0.76rem;
      font-weight: 750;
    }

    .language-switcher button {
      min-width: 52px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--soft);
      padding: 5px 9px;
      font-size: 0.78rem;
      font-weight: 850;
    }

    .language-switcher button.active {
      background: var(--charcoal);
      color: #fff;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: clamp(252px, 39vh, 348px);
      overflow: hidden;
      border-radius: 20px;
      background:
        radial-gradient(circle at 18% 22%, rgba(148, 163, 184, 0.16), transparent 24%),
        radial-gradient(circle at 82% 72%, rgba(111, 128, 100, 0.18), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 18px),
        var(--canvas-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), 0 6px 18px rgba(17, 24, 39, 0.08);
      touch-action: manipulation;
      user-select: none;
    }

    #canvas-container::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      z-index: 3;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 38%),
        radial-gradient(circle at center, transparent 56%, rgba(0,0,0,0.12));
    }

    #simCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      pointer-events: none;
      z-index: 5;
    }

    .grid-cell {
      border: 1px solid rgba(255,255,255,0.34);
      background: rgba(17,24,39,0.62);
      pointer-events: auto;
      transition: background 0.16s ease, box-shadow 0.16s ease;
    }

    .grid-cell:hover {
      background: rgba(71,85,105,0.52);
      box-shadow: inset 0 0 0 2px rgba(221,214,196,0.72);
    }

    .revealed {
      border: 1px solid rgba(255,255,255,0.36);
      background: rgba(255,255,255,0.055);
      pointer-events: none;
    }

    #netPreview {
      position: absolute;
      width: var(--net-size);
      height: var(--net-size);
      border: 3px solid rgba(237,218,142,0.96);
      background:
        linear-gradient(rgba(237,218,142,0.26) 1px, transparent 1px),
        linear-gradient(90deg, rgba(237,218,142,0.26) 1px, transparent 1px),
        rgba(237,218,142,0.09);
      background-size: 14px 14px;
      border-radius: 0.35rem;
      pointer-events: none;
      z-index: 7;
    }

    .capture-flash {
      position: absolute;
      width: var(--net-size);
      height: var(--net-size);
      border: 3px solid rgba(95,122,111,0.95);
      background: rgba(95,122,111,0.13);
      border-radius: 0.35rem;
      pointer-events: none;
      z-index: 8;
      animation: flashOut 0.34s ease-out forwards;
    }

    @keyframes flashOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.2); }
    }

    .method-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .mode-btn,
    .level-btn,
    .speed-btn,
    .calc-btn,
    #revealBtn,
    .capture-actions button {
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: none;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, transform 0.12s ease;
    }

    .mode-btn:hover,
    .level-btn:hover,
    .speed-btn:hover,
    .calc-btn:hover,
    #revealBtn:hover,
    .capture-actions button:hover {
      transform: translateY(-1px);
    }

    .mode-btn {
      min-height: 72px;
      padding: 0.88rem 1rem;
      text-align: left;
    }

    .mode-btn span {
      display: block;
      font-weight: 850;
      font-size: 1rem;
    }

    .mode-btn small {
      display: block;
      margin-top: 0.28rem;
      font-size: 0.76rem;
      font-weight: 650;
      line-height: 1.25;
    }

    .mode-counting { background: var(--blue); color: #2f556a; }
    .mode-capture { background: var(--green); color: #3f5f45; }
    .mode-quadrat { background: var(--lilac); color: #5a5278; }
    .mode-counting small { color: rgba(48,69,81,0.82); }
    .mode-capture small { color: rgba(63,95,69,0.80); }
    .mode-quadrat small { color: rgba(90,82,120,0.82); }
    .mode-counting.active { background: var(--blue-active); border-color: #84a9bc; }
    .mode-capture.active { background: var(--green-active); border-color: #95b68c; }
    .mode-quadrat.active { background: var(--lilac-active); border-color: #a898c6; }

    .setting-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: rgba(255,255,255,0.92);
    }

    .setting-row {
      display: grid;
      grid-template-columns: 118px 1fr;
      align-items: center;
      gap: 10px;
    }

    h2 {
      margin: 0;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 850;
    }

    h2::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 1.05rem;
      margin-right: 8px;
      vertical-align: -2px;
      border-radius: 999px;
      background: var(--sage);
    }

    .button-group {
      display: grid;
      gap: 8px;
    }

    .button-group.three { grid-template-columns: repeat(3, 1fr); }
    .button-group.four { grid-template-columns: repeat(4, 1fr); }

    .level-btn,
    .speed-btn {
      min-height: 42px;
      padding: 0.48rem 0.4rem;
      background: rgba(255,255,255,0.92);
      color: #55646c;
      font-weight: 850;
    }

    .level-btn.active,
    .speed-btn.active {
      background: var(--sage-dark);
      border-color: var(--sage-dark);
      color: #fff;
    }

    .calculator-row {
      display: grid;
      grid-template-columns: repeat(15, minmax(0, 1fr)) minmax(7.2rem, 1.9fr) minmax(0, 1fr);
      gap: 0.5rem;
      align-items: center;
    }

    .calc-btn {
      min-width: 0;
      height: 2.9rem;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 850;
    }

    .calc-op {
      background: #5b7072;
      border-color: #5b7072;
      color: #fff;
    }

    .calc-eq {
      background: var(--sky);
      border-color: var(--sky);
      color: #fff;
    }

    .calculator-display {
      width: 100%;
      min-width: 0;
      height: 2.9rem;
      padding: 0.5rem 0.85rem;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      text-align: right;
      font-size: 1.1rem;
      font-weight: 850;
      outline: none;
    }

    .side-card {
      border-radius: 20px;
      padding: 10px;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(79,106,82,0.12);
      background: #e8f2e6;
      color: #4f6a52;
      font-size: 0.78rem;
      font-weight: 850;
    }

    .marked-line {
      margin: 0.45rem 0 0;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 850;
    }

    .marked-line #markedTotal { color: #4f6a52; }

    .net-box {
      margin-top: 0.45rem;
      padding: 0.82rem;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: #fbfcfa;
      text-align: center;
    }

    .net-box p {
      margin: 0 0 0.5rem;
      color: var(--soft);
      font-size: 0.9rem;
      font-weight: 750;
    }

    #netCanvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 300 / 54;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .net-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 8px;
      font-size: 0.86rem;
    }

    .net-stats div {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 0.52rem 0.4rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.94);
    }

    .net-stats span { color: var(--soft); }
    .net-stats strong { color: #4f6a52; }
    #netMarked { color: #b4646d; }

    .capture-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .capture-actions button {
      min-height: 38px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 850;
    }

    .capture-actions button:first-child {
      background: var(--sage);
      border-color: var(--sage);
    }

    .capture-actions button:last-child {
      background: #70797d;
      border-color: #70797d;
    }

    .quadrat-settings {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: end;
      gap: 8px;
      text-align: center;
      color: var(--soft);
      font-size: 0.86rem;
      font-weight: 750;
    }

    .quadrat-settings label {
      display: grid;
      gap: 4px;
    }

    .quadrat-settings input,
    .average-row input,
    #studentEstimate {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 15px;
      background: rgba(255,255,255,0.94);
      color: var(--text);
      padding: 0.62rem 0.7rem;
      text-align: center;
      font-weight: 850;
      outline: none;
    }

    .quadrat-settings input:focus,
    .average-row input:focus,
    #studentEstimate:focus {
      border-color: #89aebd;
      box-shadow: 0 0 0 3px rgba(137,174,189,0.12);
    }

    #totalCells {
      display: block;
      margin-top: 4px;
      border: 1px solid rgba(90,82,120,0.10);
      border-radius: 12px;
      background: #f3eef9;
      color: #5a5278;
      padding: 0.62rem 0.5rem;
    }

    .table-wrap {
      margin-top: 0.7rem;
      max-height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.86);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 0.88rem;
    }

    thead {
      position: sticky;
      top: 0;
      background: #f9faf8;
      color: var(--soft);
    }

    th, td {
      padding: 0.62rem 0.45rem;
      border-bottom: 1px solid rgba(66,90,102,0.09);
    }

    td {
      color: var(--text);
      font-weight: 850;
    }

    .empty-row td {
      color: var(--soft);
      font-weight: 700;
    }

    .average-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      align-items: center;
      gap: 8px;
      margin-top: 0.7rem;
      padding: 0.65rem 0.75rem;
      border: 1px solid rgba(90,82,120,0.10);
      border-radius: 18px;
      background: #f3eef9;
      color: #5a5278;
      font-size: 0.9rem;
      font-weight: 850;
    }

    #estResult {
      margin: 0;
      padding: 0.65rem 0.8rem;
      border: 1px solid rgba(73,97,109,0.10);
      border-radius: 17px;
      background: #edf5f8;
      color: #49616d;
      font-size: 0.9rem;
      font-weight: 850;
      line-height: 1.5;
    }

    #estNote {
      min-height: 0;
      margin: 0.45rem 0 0;
      color: var(--soft);
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .estimate-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px;
      gap: 8px;
      margin-top: 0.7rem;
    }

    #studentEstimate {
      height: 3rem;
      padding: 0.55rem 0.85rem;
      font-size: 1.05rem;
      text-align: left;
    }

    #studentEstimate::placeholder,
    .average-row input::placeholder {
      color: #7a8a93;
      opacity: 1;
    }

    #revealBtn {
      border-color: var(--charcoal);
      background: var(--charcoal);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 850;
    }

    .result-box {
      margin-top: 0.7rem;
      min-height: 62px;
      padding: 0.8rem;
      border: 1px solid rgba(114,87,87,0.10);
      border-radius: 18px;
      background: var(--rose-bg);
      color: var(--rose-text);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .metric-card {
      padding: 0.62rem 0.68rem;
      border: 1px solid rgba(66,90,102,0.10);
      border-radius: 16px;
      background: rgba(255,255,255,0.95);
    }

    .metric-label {
      color: #738089;
      font-size: 0.72rem;
      font-weight: 750;
      line-height: 1.25;
    }

    .metric-value {
      margin-top: 0.14rem;
      color: var(--text);
      font-size: 1rem;
      font-weight: 850;
    }

    @media (max-width: 1320px) {
      .calculator-row {
        grid-template-columns: repeat(15, minmax(0, 1fr)) minmax(6.4rem, 1.5fr) minmax(0, 1fr);
        gap: 0.42rem;
      }

      .calc-btn,
      .calculator-display {
        height: 2.72rem;
      }
    }

    @media (orientation: portrait), (max-width: 900px) {
      body { overflow: auto; }

      #app {
        height: auto;
        min-height: 100dvh;
        overflow: visible;
        padding: 10px;
      }

      .layout-grid {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
        gap: 12px;
      }

      .left-column,
      .right-column,
      .card {
        overflow: visible;
      }

      #canvas-container { height: 292px; }
      .method-grid { grid-template-columns: repeat(3, 1fr); }

      .mode-btn {
        min-height: 66px;
        padding: 0.72rem 0.78rem;
      }

      .mode-btn span { font-size: 0.88rem; }
      .mode-btn small { font-size: 0.68rem; }
      .setting-card { grid-template-columns: 1fr; }
      .calculator-row { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .calculator-display { grid-column: span 4; }
      .language-switcher { top: 18px; right: 18px; }
    }

    @media (max-width: 560px) {
      .method-grid { grid-template-columns: 1fr; }
      .setting-row { grid-template-columns: 1fr; }
      .quadrat-settings { grid-template-columns: 1fr; }
      .quadrat-settings > span { display: none; }
      .average-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <main id="app">
    <span id="modeLabel" class="hidden" data-i18n="freeObservation">自由觀察</span>
    <span id="truthBadge" class="hidden" data-i18n="notRevealedBadge">未揭曉</span>

    <section class="layout-grid">
      <div class="left-column">
        <section class="card sim-card">
          <div class="language-switcher" aria-label="語言">
            <button type="button" data-lang="zh">繁中</button>
            <button type="button" data-lang="en">English</button>
            <button type="button" data-lang="ja">日本語</button>
          </div>

          <div id="canvas-container">
            <canvas id="simCanvas"></canvas>
            <div id="gridOverlay" class="grid-overlay hidden"></div>
            <div id="netPreview" class="hidden"></div>
          </div>

          <div class="method-grid">
            <button data-mode="counting" onclick="setMode('counting')" class="mode-btn mode-counting">
              <span data-i18n="countingMethod">直接記數法</span>
              <small data-i18n="countingDesc">直接觀察並估算</small>
            </button>
            <button data-mode="capture" onclick="setMode('capture')" class="mode-btn mode-capture">
              <span data-i18n="captureMethod">捉放法</span>
              <small data-i18n="captureDesc">連點兩下使用方形撈網</small>
            </button>
            <button data-mode="quadrat" onclick="setMode('quadrat')" class="mode-btn mode-quadrat">
              <span data-i18n="quadratMethod">樣區法</span>
              <small data-i18n="quadratDesc">點選樣區後自動顯示</small>
            </button>
          </div>
        </section>

        <section class="card setting-card">
          <div class="setting-row">
            <h2 data-i18n="populationSetting">生物數量設定</h2>
            <div class="button-group three">
              <button data-level="low" onclick="setPopulationLevel('low')" class="level-btn" data-i18n="low">少</button>
              <button data-level="medium" onclick="setPopulationLevel('medium')" class="level-btn active" data-i18n="medium">多</button>
              <button data-level="high" onclick="setPopulationLevel('high')" class="level-btn" data-i18n="high">超多</button>
            </div>
          </div>

          <div class="setting-row">
            <h2 data-i18n="speedSetting">生物速度設定</h2>
            <div class="button-group four">
              <button data-speed="0" onclick="setSpeedLevel(0)" class="speed-btn" data-i18n="weed">雜草</button>
              <button data-speed="0.5" onclick="setSpeedLevel(0.5)" class="speed-btn" data-i18n="snail">蝸牛</button>
              <button data-speed="10" onclick="setSpeedLevel(10)" class="speed-btn active" data-i18n="ant">螞蟻</button>
              <button data-speed="100" onclick="setSpeedLevel(100)" class="speed-btn" data-i18n="rocket">火箭</button>
            </div>
          </div>
        </section>

        <section class="card calculator-card">
          <div class="calculator-row">
            <button class="calc-btn" onclick="calcInput('1')">1</button>
            <button class="calc-btn" onclick="calcInput('2')">2</button>
            <button class="calc-btn" onclick="calcInput('3')">3</button>
            <button class="calc-btn" onclick="calcInput('4')">4</button>
            <button class="calc-btn" onclick="calcInput('5')">5</button>
            <button class="calc-btn" onclick="calcInput('6')">6</button>
            <button class="calc-btn" onclick="calcInput('7')">7</button>
            <button class="calc-btn" onclick="calcInput('8')">8</button>
            <button class="calc-btn" onclick="calcInput('9')">9</button>
            <button class="calc-btn" onclick="calcInput('0')">0</button>
            <button class="calc-btn calc-op" onclick="calcInput('+')">＋</button>

        quadratCorrectNote: ({ mean, totalCells }) => `方形区法の正しい計算：平均 ${mean} × 区画の合計 ${totalCells}`,

    let currentLang = localStorage.getItem("bioPopulationLang") || "zh";
    let calcExpression = "0";
    let calcJustEvaluated = false;

    const $ = (id) => document.getElementById(id);
    const t = (key, params) => {
      const value = I18N[currentLang][key] ?? I18N.zh[key] ?? key;
      return typeof value === "function" ? value(params || {}) : value;
    };

    function applyLanguage(lang, { preserveResult = false } = {}) {
      currentLang = I18N[lang] ? lang : "zh";
      localStorage.setItem("bioPopulationLang", currentLang);
      document.documentElement.lang = t("htmlLang");
      document.title = t("title");

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });

      document.querySelectorAll("[data-i18n-aria]").forEach((el) => {
        el.setAttribute("aria-label", t(el.dataset.i18nAria));
      });

      document.querySelectorAll(".language-switcher button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === currentLang);
      });

      if (!preserveResult) {
        resetEstimateDisplay();
        $("truthDisplay").textContent = t("notRevealedDisplay");
      }
      refreshModeText();
      updateCaptureStats();
    }

    function resetEstimateDisplay() {
      $("estResult").textContent = t("chooseMethod");
      $("estNote").textContent = "";
    }

    function refreshModeText() {
      if (mode === "counting") {
        $("modeLabel").textContent = t("countingMethod");
        $("estResult").textContent = t("directModeStatus");
      } else if (mode === "capture") {
        $("modeLabel").textContent = t("captureMethod");
        updateCaptureStats();
      } else if (mode === "quadrat") {
        $("modeLabel").textContent = t("quadratMethod");
        if (getQuadratCounts().length > 0) {
          $("estResult").textContent = t("quadratFormulaStatus");
          $("estNote").textContent = t("totalCellsNote", { totalCells: $("totalCells").textContent });
        } else {
          $("estResult").textContent = t("quadratReadyStatus");
          $("estNote").textContent = "";
        }
      } else {
        $("modeLabel").textContent = t("freeObservation");
      }
    }

    function updateCalculatorDisplay() {
      $("calculatorDisplay").value = calcExpression.replaceAll("*", "×").replaceAll("/", "÷");
    }

    function calcInput(value) {
      const operators = ["+", "-", "*", "/"];

      if (calcExpression === t("error") || Object.values(I18N).some((dict) => calcExpression === dict.error)) {
        calcExpression = "0";
      }

      if (calcJustEvaluated && !operators.includes(value)) {
        calcExpression = "0";
      }
      calcJustEvaluated = false;

      if (operators.includes(value)) {
        const last = calcExpression.slice(-1);
        if (operators.includes(last)) {
          calcExpression = calcExpression.slice(0, -1) + value;
        } else {
          calcExpression += value;
        }
        updateCalculatorDisplay();
        return;
      }

      if (calcExpression === "0") {
        calcExpression = value;
      } else {
        calcExpression += value;
      }
      updateCalculatorDisplay();
    }

    function calcClear() {
      calcExpression = "0";
      calcJustEvaluated = false;
      updateCalculatorDisplay();
    }

    function calcEvaluate() {
      try {
        if (!/^[0-9+\-*/. ()]+$/.test(calcExpression)) return;
        const result = Function(`"use strict"; return (${calcExpression})`)();
        calcExpression = Number.isFinite(result)
          ? String(Math.round(result * 1000000) / 1000000)
          : t("error");
      } catch (error) {
        calcExpression = t("error");
      }
      calcJustEvaluated = true;
      updateCalculatorDisplay();
    }

    const canvas = $("simCanvas");
    const ctx = canvas.getContext("2d");
    const netCanvas = $("netCanvas");
    const netCtx = netCanvas.getContext("2d");
    const container = $("canvas-container");
    const gridOverlay = $("gridOverlay");
    const netPreview = $("netPreview");

    const NET_SIZE = 82;
    const POPULATION_LEVEL_RANGES = {
      low: [10, 50],
      medium: [100, 500],
      high: [1000, 1200]
    };

    let mode = "none";
    let entities = [];
    let populationLevel = "medium";
    let popSize = randomPopulationCount(populationLevel);
    let speedLevel = 10;
    let net = [];
    let markedCount = 0;
    let caughtTotal = 0;
    let recapturedCount = 0;
    let captureNumerator = 0;
    let captureDenominator = 0;
    let lastCaptureForEstimate = null;
    let phase = 0;
    let lastTap = { time: 0, x: -9999, y: -9999 };
    let quadratSampleNo = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomPopulationCount(level) {
      const range = POPULATION_LEVEL_RANGES[level] || POPULATION_LEVEL_RANGES.medium;
      return randomInt(range[0], range[1]);
    }

    function randomVelocityVector() {
      const angle = Math.random() * Math.PI * 2;
      const baseSpeed = 0.8 + Math.random() * 0.7;
      return {
        dx: Math.cos(angle) * baseSpeed,
        dy: Math.sin(angle) * baseSpeed
      };
    }

    function createEntity(isMarked = false) {
      const v = randomVelocityVector();
      return {
        id: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now() + Math.random()),
        x: Math.random() * Math.max(1, canvas.width - 24) + 12,
        y: Math.random() * Math.max(1, canvas.height - 24) + 12,
        dx: v.dx,
        dy: v.dy,
        radius: 4.6 + Math.random() * 1.6,
        isMarked
      };
    }

    function resizeCanvas() {
      const oldWidth = canvas.width || container.clientWidth || 800;
      const oldHeight = canvas.height || container.clientHeight || 300;

      canvas.width = container.clientWidth || 800;
      canvas.height = container.clientHeight || 300;

      if (entities.length > 0 && oldWidth && oldHeight) {
        const sx = canvas.width / oldWidth;
        const sy = canvas.height / oldHeight;
        entities.forEach((e) => {
          e.x = clamp(e.x * sx, e.radius, canvas.width - e.radius);
          e.y = clamp(e.y * sy, e.radius, canvas.height - e.radius);
        });
      }

      if (mode === "quadrat") updateGrid();
    }

    function setPopulationLevel(level) {
      populationLevel = level;
      resetPopulation(randomPopulationCount(level));
      updateLevelButtons();
    }

    function updateLevelButtons() {
      document.querySelectorAll(".level-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.level === populationLevel);
      });
    }

    function setSpeedLevel(value) {
      speedLevel = Number(value);
      document.querySelectorAll(".speed-btn").forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.speed) === speedLevel);
      });
    }

    function resetPopulation(count) {
      popSize = count;
      net = [];
      entities = Array.from({ length: popSize }, () => createEntity(false));
      resetMeasurementState(false);
    }

    function resetMeasurementState(returnNet = true) {
      if (returnNet && net.length > 0) {
        entities = entities.concat(net);
        net = [];
      }

      entities.forEach((e) => { e.isMarked = false; });

      markedCount = 0;
      caughtTotal = 0;
      recapturedCount = 0;
      captureNumerator = 0;
      captureDenominator = 0;
      lastCaptureForEstimate = null;
      phase = 0;
      lastTap = { time: 0, x: -9999, y: -9999 };
      quadratSampleNo = 0;

      $("truthBadge").textContent = t("notRevealedBadge");
      $("truthDisplay").textContent = t("notRevealedDisplay");
      $("studentEstimate").value = "";

      if ($("phaseDisplay")) $("phaseDisplay").textContent = t("notCaptured");
      if ($("markedTotal")) $("markedTotal").textContent = "0";
      resetQuadratRows();
      resetEstimateDisplay();
      drawNetCanvas();
      updateCaptureStats();

      if (mode === "quadrat") updateGrid();
    }

    function setMode(nextMode) {
      mode = nextMode;
      resetMeasurementState(true);

      $("capturePanel").classList.toggle("hidden", mode !== "capture");
      $("quadratPanel").classList.toggle("hidden", mode !== "quadrat");
      gridOverlay.classList.toggle("hidden", mode !== "quadrat");
      netPreview.classList.add("hidden");

      document.querySelectorAll(".mode-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      if (mode === "counting") {
        $("modeLabel").textContent = t("countingMethod");
        $("estResult").textContent = t("directModeStatus");
        $("estNote").textContent = "";
      }

      if (mode === "capture") {
        $("modeLabel").textContent = t("captureMethod");
        updateCaptureStats();
      }

      if (mode === "quadrat") {
        $("modeLabel").textContent = t("quadratMethod");
        $("estResult").textContent = t("quadratReadyStatus");
        $("estNote").textContent = "";
        updateGrid();
      }
    }

    function updateCaptureStats() {
      const currentNetMarked = net.filter((n) => n.isMarked).length;
      if ($("netCount")) $("netCount").textContent = net.length;
      if ($("netMarked")) $("netMarked").textContent = currentNetMarked;
      if ($("markedTotal")) $("markedTotal").textContent = markedCount;
      drawNetCanvas();

      if (mode !== "capture") return;

      if (phase === 0) {
        $("phaseDisplay").textContent = net.length > 0 ? t("markingPhase") : t("notCaptured");
        $("estResult").textContent = t("captureReadyStatus");
        $("estNote").textContent = "";
        return;
      }

      $("phaseDisplay").textContent = t("secondCapture");
      $("estResult").textContent = t("captureFormulaStatus");
      $("estNote").textContent = "";
    }

    function drawEntities() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const speedFactor = speedLevel / 10;

      entities.forEach((e) => {
        if (speedLevel > 0) {
          e.x += e.dx * speedFactor;
          e.y += e.dy * speedFactor;

          if (e.x < e.radius || e.x > canvas.width - e.radius) {
            e.dx *= -1;
            e.x = clamp(e.x, e.radius, canvas.width - e.radius);
          }

          if (e.y < e.radius || e.y > canvas.height - e.radius) {
            e.dy *= -1;
            e.y = clamp(e.y, e.radius, canvas.height - e.radius);
          }
        }

        ctx.beginPath();
        ctx.fillStyle = e.isMarked ? "#fb7185" : "#22d3ee";
        ctx.shadowColor = e.isMarked ? "rgba(251, 113, 133, 0.55)" : "rgba(34, 211, 238, 0.45)";
        ctx.shadowBlur = 10;
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 1.4;
        ctx.strokeStyle = e.isMarked ? "rgba(255,255,255,0.90)" : "rgba(255,255,255,0.50)";
        ctx.stroke();
      });

      requestAnimationFrame(drawEntities);
    }

    function drawNetCanvas() {
      if (!netCtx) return;

      netCtx.clearRect(0, 0, netCanvas.width, netCanvas.height);
      netCtx.fillStyle = "#f8fafc";
      netCtx.fillRect(0, 0, netCanvas.width, netCanvas.height);

      net.slice(0, 70).forEach((n, i) => {
        const col = i % 23;
        const row = Math.floor(i / 23);
        const x = 10 + col * 12;
        const y = 12 + row * 17;

        netCtx.beginPath();
        netCtx.fillStyle = n.isMarked ? "#fb7185" : "#22d3ee";
        netCtx.arc(x, y, 4.8, 0, Math.PI * 2);
        netCtx.fill();
      });

      if (net.length > 70) {
        netCtx.fillStyle = "#334155";
        netCtx.font = "bold 13px sans-serif";
        netCtx.fillText(`+${net.length - 70}`, 260, 50);
      }
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const clientX = event.clientX ?? event.touches?.[0]?.clientX;
      const clientY = event.clientY ?? event.touches?.[0]?.clientY;

      return {
        x: clamp(clientX - rect.left, NET_SIZE / 2, canvas.width - NET_SIZE / 2),
        y: clamp(clientY - rect.top, NET_SIZE / 2, canvas.height - NET_SIZE / 2)
      };
    }

    function moveNetPreview(event) {
      if (mode !== "capture") {
        netPreview.classList.add("hidden");
        return;
      }

      const point = getCanvasPoint(event);
      netPreview.style.left = `${point.x - NET_SIZE / 2}px`;
      netPreview.style.top = `${point.y - NET_SIZE / 2}px`;
      netPreview.classList.remove("hidden");
    }

    function captureAt(x, y) {
      if (mode !== "capture") return;

      const left = x - NET_SIZE / 2;
      const right = x + NET_SIZE / 2;
      const top = y - NET_SIZE / 2;
      const bottom = y + NET_SIZE / 2;
      const caught = [];
      const remaining = [];

      entities.forEach((entity) => {
        if (entity.x >= left && entity.x <= right && entity.y >= top && entity.y <= bottom) {
          caught.push(entity);
        } else {
          remaining.push(entity);
        }
      });

      entities = remaining;
      net = net.concat(caught);

      if (phase === 1) {
        const currentNetMarked = net.filter((n) => n.isMarked).length;
        lastCaptureForEstimate = {
          markedTotal: markedCount,
          captureTotal: net.length,
          recapturedMarked: currentNetMarked
        };
      }

      showCaptureFlash(left, top);
      updateCaptureStats();
    }

    function showCaptureFlash(left, top) {
      const flash = document.createElement("div");
      flash.className = "capture-flash";
      flash.style.left = `${left}px`;
      flash.style.top = `${top}px`;
      container.appendChild(flash);
      window.setTimeout(() => flash.remove(), 360);
    }

    function markCaught() {
      if (mode !== "capture" || net.length === 0) return;

      const currentNetMarked = net.filter((n) => n.isMarked).length;

      if (phase === 0) {
        phase = 1;
      } else {
        const markedBeforeThisCatch = markedCount;
        lastCaptureForEstimate = {
          markedTotal: markedBeforeThisCatch,
          captureTotal: net.length,
          recapturedMarked: currentNetMarked
        };
        caughtTotal += net.length;
        recapturedCount += currentNetMarked;
        captureNumerator += markedBeforeThisCatch * net.length;
        captureDenominator += currentNetMarked;
      }

      net.forEach((entity) => {
        if (!entity.isMarked) {
          entity.isMarked = true;
          markedCount++;
        }
      });

      releaseCaught(false);
      updateCaptureStats();
    }

    function releaseCaught(resetStudent = true) {
      if (net.length > 0) {
        entities = entities.concat(net);
        net = [];
      }
      if (resetStudent && mode === "capture" && phase === 0) resetEstimateDisplay();
      updateCaptureStats();
    }

    function resetQuadratRows() {
      if (!$("quadratRows")) return;
      $("quadratRows").innerHTML = `<tr class="empty-row"><td colspan="2">${t("clickLeftQuadrat")}</td></tr>`;
    }

    function updateGrid() {
      if (mode !== "quadrat") return;

      const rows = clamp(parseInt($("rows").value, 10) || 3, 1, 10);
      const cols = clamp(parseInt($("cols").value, 10) || 5, 1, 10);

      $("rows").value = rows;
      $("cols").value = cols;
      $("totalCells").textContent = rows * cols;

      gridOverlay.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      gridOverlay.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      gridOverlay.innerHTML = "";
      quadratSampleNo = 0;
      resetQuadratRows();

      for (let i = 0; i < rows * cols; i++) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "grid-cell";
        cell.dataset.index = i;
        cell.addEventListener("click", () => {
          cell.classList.remove("grid-cell");
          cell.classList.add("revealed");
          cell.disabled = true;
          addQuadratRow(i);
        });
        gridOverlay.appendChild(cell);
      }
    }

    function countEntitiesInQuadratCell(index) {
      const rows = parseInt($("rows").value, 10);
      const cols = parseInt($("cols").value, 10);
      const cellWidth = canvas.width / cols;
      const cellHeight = canvas.height / rows;
      const gridX = index % cols;
      const gridY = Math.floor(index / cols);
      const x1 = gridX * cellWidth;
      const x2 = (gridX + 1) * cellWidth;
      const y1 = gridY * cellHeight;
      const y2 = (gridY + 1) * cellHeight;

      return entities.filter((entity) =>
        entity.x >= x1 && entity.x < x2 && entity.y >= y1 && entity.y < y2
      ).length;
    }

    function addQuadratRow(cellIndex) {
      quadratSampleNo += 1;
      const sampleCount = countEntitiesInQuadratCell(cellIndex);

      if (quadratSampleNo === 1) {
        $("quadratRows").innerHTML = "";
      }

      const tr = document.createElement("tr");
      tr.dataset.count = String(sampleCount);
      tr.innerHTML = `
        <td>${quadratSampleNo}</td>
        <td>${sampleCount}</td>
      `;
      $("quadratRows").appendChild(tr);

      $("estResult").textContent = t("quadratFormulaStatus");
      $("estNote").textContent = t("totalCellsNote", { totalCells: $("totalCells").textContent });
    }

    function getQuadratCounts() {
      return Array.from(document.querySelectorAll("#quadratRows tr[data-count]"))
        .map((row) => Number(row.dataset.count))
        .filter((value) => Number.isFinite(value) && value >= 0);
    }

    function getCorrectMethodEstimate() {
      if (mode === "counting") {
        return {
          value: popSize,
          mean: null,
          note: t("directCorrectNote")
        };
      }

      if (mode === "capture") {
        const currentNetMarked = net.filter((n) => n.isMarked).length;
        const currentCaptureData = {
          markedTotal: markedCount,
          captureTotal: net.length,
          recapturedMarked: currentNetMarked
        };

        const data = currentCaptureData.captureTotal > 0
          ? currentCaptureData
          : lastCaptureForEstimate;

        if (data && data.markedTotal > 0 && data.captureTotal > 0 && data.recapturedMarked > 0) {
          return {
            value: Math.round((data.markedTotal * data.captureTotal) / data.recapturedMarked),
            mean: null,
            note: t("captureCorrectNote", data)
          };
        }

        return {
          value: null,
          mean: null,
          note: t("captureNeedMarkedNote")
        };
      }

      if (mode === "quadrat") {
        const counts = getQuadratCounts();
        const totalCells = parseInt($("totalCells").textContent, 10);

        if (counts.length > 0 && totalCells > 0) {
          const sum = counts.reduce((a, b) => a + b, 0);
          const mean = sum / counts.length;
          return {
            value: Math.round(mean * totalCells),
            mean,
            note: t("quadratCorrectNote", { mean: mean.toFixed(2), totalCells })
          };
        }

        return {
          value: null,
          mean: null,
          note: t("quadratNeedDataNote")
        };
      }

      return {
        value: null,
        mean: null,
        note: t("noMethodNote")
      };
    }

    function formatMethodError(correctValue) {
      if (correctValue === null) return t("insufficientData");
      const absError = Math.abs(correctValue - popSize);
      const percent = ((absError / popSize) * 100).toFixed(1);
      return currentLang === "en"
        ? `${absError} ${t("organismUnit")}, ${percent}%`
        : `${absError}${t("organismUnit")}, ${percent}%`;
    }

    function renderRevealResult() {
      const estimate = Number($("studentEstimate").value);
      const hasEstimate = Number.isFinite(estimate) && estimate >= 0;
      const roundedEstimate = hasEstimate ? Math.round(estimate) : t("noInput");
      const correct = getCorrectMethodEstimate();

      $("truthBadge").textContent = popSize;

      const correctValue = correct.value !== null ? correct.value : t("insufficientData");
      const methodError = formatMethodError(correct.value);

      const metric = (label, value) => `
        <div class="metric-card">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
        </div>
      `;

      $("truthDisplay").innerHTML = `
        <div class="metric-grid">
          ${metric(t("yourEstimate"), roundedEstimate)}
          ${metric(t("correctEstimate"), correctValue)}
          ${metric(t("actualNumber"), popSize)}
          ${metric(t("methodError"), methodError)}
        </div>
      `;

      $("estNote").textContent = correct.note;
    }

    container.addEventListener("pointermove", moveNetPreview);
    container.addEventListener("pointerleave", () => netPreview.classList.add("hidden"));
    container.addEventListener("pointerdown", (event) => {
      if (mode !== "capture") return;
      event.preventDefault();
      moveNetPreview(event);

      const point = getCanvasPoint(event);
      const now = Date.now();
      const distance = Math.hypot(point.x - lastTap.x, point.y - lastTap.y);

      if (now - lastTap.time < 340 && distance < 36) {
        captureAt(point.x, point.y);
        lastTap = { time: 0, x: -9999, y: -9999 };
      } else {
        lastTap = { time: now, x: point.x, y: point.y };
      }
    });

    $("revealBtn").addEventListener("click", renderRevealResult);

    document.querySelectorAll(".language-switcher button").forEach((btn) => {
      btn.addEventListener("click", () => applyLanguage(btn.dataset.lang, { preserveResult: false }));
    });

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("load", () => {
      applyLanguage(currentLang);
      resizeCanvas();
      updateLevelButtons();
      setSpeedLevel(speedLevel);
      resetPopulation(popSize);
      drawEntities();
    });
  </script>
</body>
</html>
